<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | SysAdmin & Réseau</title>
    
    <link id="favicon-link" rel="icon" href="">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background-gradient"></div>

    <header class="app-header">
        
        <div class="header-left">
            <img id="profile-avatar" src="" alt="Avatar" class="id-avatar">
            <div class="identity-info">
                <span id="profile-name" class="id-name"></span>
                <div class="status-wrapper">
                    <span class="status-dot"></span>
                    <span id="profile-status" class="id-status"></span>
                </div>
            </div>
        </div>

        <nav class="nav-capsule">
            <ul id="nav-list">
                </ul>
        </nav>

        <div class="header-right">
            <button id="theme-toggle" class="theme-icon">☀️</button>
        </div>
    </header>

    <div class="container">
        
        <section class="hero-section">
            <h1 class="hero-title"><span id="typewriter-area"></span><span class="cursor">|</span></h1>
            <p id="profile-bio" class="bio-text"></p>

            <div class="social-links">
                <a id="link-github" href="#" target="_blank" class="social-btn">GitHub</a>
                <a id="link-linkedin" href="#" target="_blank" class="social-btn">LinkedIn</a>
                <a id="email-trigger" href="#" class="social-btn email">Contact</a>
            </div>
            
            <div id="skills-section" class="skills-section"></div>
        </section>

        <section id="projets" class="section-wrapper">
            <h3>Projets & Labs</h3>
            <div id="project-grid" class="grid"></div>
        </section>

        <div class="two-column-layout">
            <section id="parcours" class="section-wrapper">
                <h3>Parcours</h3>
                <ul id="exp-list" class="timeline-list"></ul>
            </section>

            <section id="competences" class="section-wrapper">
                <h3>Compétences</h3>
                <ul id="comp-list" class="cert-list"></ul>
            </section>
        </div>

        <section id="certifications" class="section-wrapper">
            <h3>Certifications</h3>
            <ul id="cert-list" class="cert-list"></ul>
        </section>

        <footer><p id="footer-copy"></p></footer>
    </div>

    <div id="email-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header"><span>Contact</span><button class="close-btn" onclick="closeModal()">×</button></div>
            <div class="modal-body">
                <p>Mon adresse email :</p>
                <div class="email-box"><span id="email-text"></span></div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>

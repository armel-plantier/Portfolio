<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Portfolio</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Fira+Code&display=swap" rel="stylesheet">
    
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
</head>

<body>
    <header class="app-header">
        <div class="header-content">
            <h1 id="profile-name">Mon Nom</h1>
            <nav>
                <ul id="nav-list"></ul> </nav>
            <button id="theme-toggle">🌙</button>
        </div>
    </header>

    <main>
        <section id="accueil" class="hero">
            <div class="terminal-window">
                <div class="terminal-header">
                    <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
                </div>
                <div class="terminal-body">
                    <p class="prompt">user@portfolio:~$ <span id="typewriter-text"></span><span class="cursor">|</span></p>
                    <p id="bio-text" class="bio">Chargement...</p>
                </div>
            </div>
            
            <div class="social-links">
                <a id="github-link" href="#" target="_blank" class="btn">GitHub</a>
                <a id="linkedin-link" href="#" target="_blank" class="btn">LinkedIn</a>
                <button id="contact-btn" class="btn btn-primary">Me contacter</button>
            </div>
            
            <div id="skills-container" class="skills-cloud"></div>
        </section>

        <section id="projets">
            <h3>Projets & Labs</h3>
            <div id="projects-grid" class="grid"></div>
        </section>

        <section id="parcours">
            <h3>Parcours</h3>
            <ul class="timeline-list"></ul>
        </section>

        <section id="competences">
            <h3>Compétences Techniques</h3>
            <div id="competences-grid" class="grid"></div>
        </section>
        
        <section id="certifications">
            <h3>Certifications</h3>
            <ul class="cert-list"></ul>
        </section>
    </main>

    <footer>
        <p>© 2024 - Portfolio Personnel</p>
    </footer>

    <div id="contact-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h3>Contact</h3>
            <div id="captcha-container"></div>
            <div id="email-result-area" style="display:none;">
                <p id="email-text"></p>
                <button id="copy-btn">Copier</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>

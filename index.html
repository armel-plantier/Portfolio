<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | SysAdmin & Réseau</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
</head>

<body>
    <header class="app-header">
        <div class="header-container">
            <div class="profile-summary">
                <div class="avatar-container">
                    <img id="avatar-img" src="" alt="Avatar">
                    <span class="status-indicator"></span>
                </div>
                <div class="profile-info">
                    <h1 id="profile-name">Chargement...</h1>
                    <span id="profile-status" class="status-text">...</span>
                </div>
            </div>

            <div class="nav-capsule">
                <nav>
                    <ul id="nav-list">
                        </ul>
                </nav>
                <button class="theme-toggle" id="theme-toggle" aria-label="Changer de thème">
                    <span>🌙</span>
                </button>
                <div class="menu-icon">☰</div>
            </div>
        </div>
    </header>

    <main>
        <section id="accueil" class="hero-section">
            <div class="hero-content">
                <div class="terminal-badge">root@portfolio:~#</div>
                <h2 class="hero-title">
                    <span id="typewriter-text"></span><span class="cursor">|</span>
                </h2>
                <p id="bio-text" class="hero-bio">...</p>
                
                <div class="hero-actions">
                    <a id="github-link" href="#" target="_blank" class="btn btn-primary">
                        GitHub
                    </a>
                    <a id="linkedin-link" href="#" target="_blank" class="btn btn-outline">
                        LinkedIn
                    </a>
                    <button id="contact-btn" class="btn btn-accent">
                        ✉ Contact
                    </button>
                </div>

                <div class="skills-wrapper" id="skills-container">
                    </div>
            </div>
        </section>

        <section id="projets" class="section-container">
            <h3 class="section-title">Projets & Labs</h3>
            <div class="projects-grid" id="projects-grid">
                </div>
            <div class="load-more-container">
                <button id="load-more-projects" class="btn-text">Voir plus de projets ▼</button>
            </div>
        </section>

        <section id="parcours" class="section-container">
            <h3 class="section-title">Parcours</h3>
            <ul class="timeline-list">
                </ul>
        </section>

        <section id="competences" class="section-container">
            <h3 class="section-title">Compétences</h3>
            <div class="competences-grid" id="competences-grid">
                </div>
        </section>

        <section id="certifications" class="section-container">
            <h3 class="section-title">Certifications</h3>
            <ul class="cert-list">
                </ul>
        </section>
    </main>

    <footer>
        <p>© 2024 - Portfolio Personnel</p>
    </footer>

    <div id="contact-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn">&times;</button>
            <h3>Me contacter</h3>
            <p>Vérification de sécurité requise.</p>
            
            <div id="captcha-step">
                <div id="captcha-container"></div>
            </div>

            <div id="email-result-area" style="display:none; margin-top:1rem;">
                <div class="email-box">
                    <span id="email-text"></span>
                    <button id="copy-btn" class="copy-icon">Copier</button>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>

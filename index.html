<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self'; 
        script-src 'self' 'unsafe-inline'; 
        style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; 
        font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com; 
        img-src 'self' data: https:; 
        frame-src 'self' https://docs.google.com; 
        base-uri 'self';
    ">
    
    <title>Chargement du Portfolio...</title> <link id="favicon-link" rel="icon" type="image/x-icon" href="">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="app-header">
        <div class="nav-capsule">
            <div class="logo-area">
                <span class="logo-text">AP.</span>
            </div>
            
            <nav class="main-nav">
                <ul id="nav-list">
                    </ul>
            </nav>

            <div class="header-actions">
                <button id="theme-toggle" class="theme-btn" aria-label="Changer le thème">☀️</button>
                <button class="menu-icon" aria-label="Ouvrir le menu">☰</button>
            </div>
        </div>
    </header>

    <main>
        <section id="accueil" class="profile-section">
            <div class="profile-container">
                <img id="profile-avatar" src="" alt="Avatar" class="avatar-img">
                <div class="profile-content">
                    <h1 id="profile-name"></h1>
                    <h2 id="profile-status" class="status-badge"></h2>
                    <div class="typewriter-container">
                        <span id="typewriter-area"></span><span class="cursor">|</span>
                    </div>
                    <p id="profile-bio"></p>
                    
                    <div class="social-links">
                        <a id="link-github" class="social-btn" target="_blank"><i class="fa-brands fa-github"></i> GitHub</a>
                        <a id="link-linkedin" class="social-btn" target="_blank"><i class="fa-brands fa-linkedin"></i> LinkedIn</a>
                        <a href="#" id="email-trigger" class="social-btn email-btn"><i class="fa-solid fa-envelope"></i> Contact</a>
                    </div>
                </div>
            </div>
            
            <div id="skills-section" class="skills-ticker">
                </div>
        </section>

        <hr class="section-divider">

        <section id="projects" class="section-block">
            <h3 class="section-title">Projets & Réalisations</h3>
            <div id="project-grid" class="grid-container">
                </div>
        </section>

        <section id="parcours" class="section-block">
            <h3 class="section-title">Parcours</h3>
            <ul id="exp-list" class="timeline-list">
                </ul>
        </section>

        <section id="competences" class="section-block">
            <h3 class="section-title">Compétences Techniques</h3>
            <ul id="comp-list" class="comp-list-grid">
                </ul>
        </section>

        <section id="certifs" class="section-block">
            <h3 class="section-title">Certifications</h3>
            <ul id="cert-list" class="cert-list">
                </ul>
        </section>
    </main>

    <footer>
        <p id="footer-copy"></p>
    </footer>

    <div id="email-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h3>Me contacter</h3>
            <p>Voici mon adresse email :</p>
            <div class="email-box">
                <span id="email-text"></span>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>

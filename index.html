<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfolio Administrateur Système et Réseau">
    <link rel="icon" href="https://github.githubassets.com/favicons/favicon.svg" type="image/svg+xml">

    <title>root@portfolio:~#</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <header>
            <img id="profile-avatar" src="" alt="Avatar" class="avatar">

            <h1 id="profile-name"><span class="cursor">_</span></h1>
            
            <div class="status-badge">
                <span class="status-dot"></span>
                <span id="profile-status">...</span>
            </div>

            <h2 id="typewriter-area"></h2>

            <div class="terminal-bio">
                <span class="prompt">root@portfolio:~#</span> whoami<br>
                <span id="profile-bio" class="output">...</span>
            </div>

            <div class="social-links">
                <a id="link-github" href="#" target="_blank" class="social-link">
                    <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg> GitHub
                </a>
                <a id="link-linkedin" href="#" target="_blank" class="social-link">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg> LinkedIn
                </a>
                <a href="#" id="email-trigger" class="social-link">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg> Email
                </a>
            </div>

            <div id="skills-section" class="skills-section"></div>
        </header>

        <hr class="main-separator">

        <main>
            <section class="content-section">
                <h3 id="title-certs" class="section-title"></h3>
                <div class="card-container">
                    <ul id="cert-list" class="cert-list"></ul>
                </div>
            </section>

            <section class="content-section">
                <h3 id="title-projects" class="section-title"></h3>
                <div id="project-grid" class="grid"></div>
            </section>
        </main>

        <footer>
            <p>System Status: <span style="color:#238636">🟢 Online</span> | OS: Linux</p>
            <p id="footer-copy"></p>
        </footer>
    </div>

    <div id="email-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <span>root@contact:~#</span>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <p>Email Address :</p>
                <div class="email-box">
                    <span id="email-text">...</span>
                    <button onclick="copyEmail()" class="copy-btn" title="Copier">📋</button>
                </div>
                <p id="copy-feedback" style="font-size: 0.8rem; color: #238636; min-height: 20px; margin-top: 5px;"></p>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>

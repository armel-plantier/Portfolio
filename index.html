<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://encrypted-tbn0.gstatic.com; frame-src https://challenges.cloudflare.com; connect-src 'self' https://challenges.cloudflare.com; base-uri 'self'; form-action 'self';">

    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">

    <title>Portfolio | SysAdmin & Réseau</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
</head>

<body>
    <header class="app-header">
        <div class="header-container">
            <div class="profile-summary">
                <div class="avatar-container">
                    <img id="avatar-img" src="" alt="Avatar">
                    <span class="status-indicator"></span>
                </div>
                <div class="profile-info">
                    <h1 id="profile-name">Chargement...</h1>
                    <span id="profile-status" class="status-text">...</span>
                </div>
            </div>

            <div class="nav-capsule">
                <nav>
                    <ul id="nav-list">
                        </ul>
                </nav>
                <button class="theme-toggle" id="theme-toggle" aria-label="Changer de thème">
                    <span>🌙</span>
                </button>
                <div class="menu-icon">☰</div>
            </div>
        </div>
    </header>

    <main>
        <section id="accueil" class="hero-section">
            <div class="hero-content">
                <div class="terminal-badge">root@portfolio:~#</div>
                <h2 class="hero-title">
                    <span id="typewriter-text"></span><span class="cursor">|</span>
                </h2>
                <p id="bio-text" class="hero-bio">Chargement de la bio...</p>
                
                <div class="hero-actions">
                    <a id="github-link" href="#" target="_blank" class="btn btn-primary">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.05-.015-2.055-3.33.72-4.035-1.605-4.035-1.605-.54-1.38-1.335-1.755-1.335-1.755-1.08-.735.09-.72.09-.72 1.2.075 1.83 1.23 1.83 1.23 1.065 1.815 2.805 1.29 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.285 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
                        GitHub
                    </a>
                    <a id="linkedin-link" href="#" target="_blank" class="btn btn-outline">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
                        LinkedIn
                    </a>
                    <button id="contact-btn" class="btn btn-accent">
                        ✉ Contact
                    </button>
                </div>

                <div class="skills-wrapper" id="skills-container">
                    </div>
            </div>
        </section>

        <section id="projets" class="section-container">
            <h3 class="section-title">Projets & Labs</h3>
            <div class="projects-grid" id="projects-grid">
                </div>
            <div class="load-more-container">
                <button id="load-more-projects" class="btn-text">Voir plus de projets ▼</button>
            </div>
        </section>

        <section id="parcours" class="section-container">
            <h3 class="section-title">Parcours</h3>
            <ul class="timeline-list">
                </ul>
        </section>

        <section id="competences" class="section-container">
            <h3 class="section-title">Compétences</h3>
            <div class="competences-grid" id="competences-grid">
                </div>
        </section>

        <section id="certifications" class="section-container">
            <h3 class="section-title">Certifications</h3>
            <ul class="cert-list">
                </ul>
        </section>
    </main>

    <footer>
        <p>© 2024 - Propulsé par JS Vanilla & CSS</p>
    </footer>

    <div id="contact-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn">&times;</button>
            <h3>Me contacter</h3>
            <p>Prouvez que vous êtes humain pour voir mon email.</p>
            
            <div id="captcha-step">
                <div id="captcha-container"></div>
            </div>

            <div id="email-result-area" style="display:none; margin-top:1rem;">
                <div class="email-box">
                    <span id="email-text"></span>
                    <button id="copy-btn" class="copy-icon" aria-label="Copier">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>
                </div>
                <p style="font-size:0.85rem; color:var(--muted); margin-top:0.5rem;">Hâte de vous lire !</p>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>

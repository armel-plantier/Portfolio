<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Armel Plantier</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background-gradient"></div>

    <div class="container" id="profil">
        
        <header>
            <div class="top-bar">
                <div class="identity-group">
                    <img id="profile-avatar" src="" alt="Avatar" class="avatar">
                    <div class="identity-text">
                        <h1 id="profile-name"></h1>
                        <div class="sub-info">
                            <span id="typewriter-area" class="job-title"></span>
                        </div>
                        <span id="profile-status" class="status-badge"></span>
                    </div>
                </div>

                <button id="theme-toggle" class="theme-btn" title="Changer de thème">☀️</button>
            </div>

            <div class="header-content">
                <div class="bio-card">
                    <p id="profile-bio" class="bio-text"></p>
                </div>

                <div class="social-links">
                    <a id="link-github" href="#" target="_blank" class="social-btn github">
                        <svg viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                        GitHub
                    </a>
                    <a id="link-linkedin" href="#" target="_blank" class="social-btn linkedin">
                        <svg viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
                        LinkedIn
                    </a>
                    <a id="email-trigger" href="#" class="social-btn email">
                        <svg viewBox="0 0 24 24"><path d="M0 3v18h24v-18h-24zm6.623 7.929l-4.623 5.712v-11.179l4.623 5.467zm-4.484-6.069h20.366l-9.932 11.232-10.434-11.232zm16.108 5.483l4.753-5.228v10.966l-4.753-5.738zm-4.417 1.734l-1.897 2.146-1.879-2.128-4.939 5.837h13.682l-4.967-5.855z"/></svg>
                        Mail
                    </a>
                </div>

                <div id="skills-section" class="skills-section"></div>
            </div>
        </header>

        <nav class="sticky-nav">
            <ul>
                <li><a href="#projets">Projets</a></li>
                <li><a href="#parcours">Parcours</a></li>
                <li><a href="#competences">Compétences</a></li>
                <li><a href="#certifications">Certifications</a></li>
            </ul>
        </nav>

        <section id="projets" class="section-wrapper">
            <h3>Projets Réalisés</h3>
            <div id="project-grid" class="grid"></div>
        </section>

        <div class="two-column-layout">
            <section id="parcours" class="section-wrapper">
                <h3>Parcours</h3>
                <ul id="exp-list" class="timeline-list"></ul>
            </section>

            <section id="competences" class="section-wrapper">
                <h3>Compétences</h3>
                <ul id="comp-list" class="cert-list"></ul>
            </section>
        </div>

        <section id="certifications" class="section-wrapper">
            <h3>Certifications</h3>
            <ul id="cert-list" class="cert-list"></ul>
        </section>

        <footer>
            <p id="footer-copy"></p>
        </footer>

    </div>

    <div id="email-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <span>Contact</span>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <p style="margin-bottom:15px; color:var(--text-muted);">Voici mon adresse email directe :</p>
                <div class="email-box">
                    <span id="email-text"></span>
                    <button class="copy-btn" onclick="copyEmail()">Copier</button>
                </div>
                <p id="copy-feedback" style="color: #10b981; margin-top: 10px; font-weight: 500; height: 20px;"></p>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>

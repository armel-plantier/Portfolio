name: Déploiement du site

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Récupération du code
      uses: actions/checkout@v4

    - name: 📁 Préparation de la structure du site
      run: |
        cp -r Documents Site/
        cp -r Veille Site/
        mkdir -p "Site/Documents/Procédures"
        sed -i 's/GITHUB_TOKEN_PLACEHOLDER/${{ secrets.GH_TOKEN }}/g' Site/config.js

    - name: ⚙️ Configuration de GitHub Pages
      uses: actions/configure-pages@v5

    - name: 📤 Upload de l'artéfact Site
      uses: actions/upload-pages-artifact@v3
      with:
        path: './Site'

    - name: 🌐 Déploiement final
      id: deployment
      uses: actions/deploy-pages@v4

name: Debug Root-Me API

on:
  workflow_dispatch:

jobs:
  debug_rootme:
    runs-on: ubuntu-latest

    steps:
    - name: 🐍 Configuration de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 📦 Installation des dépendances
      run: pip install requests

    - name: 🔍 Exploration de l'API Root-Me
      env:
        ROOTME_API_KEY: ${{ secrets.ROOTME_API_KEY }}
      run: |
        python3 << 'EOF'
        import requests
        import json
        import os

        api_key = os.environ["ROOTME_API_KEY"]
        cookies = {"api_key": api_key}

        # Catégories qu'on veut tester
        categories = {
            "68": "Web - Serveur",
            "16": "Web - Client",
            "18": "Cryptanalyse",
            "69": "Cracking",
            "182": "Réseau",
            "67": "Stéganographie",
            "189": "App - Script",
            "17": "Programmation",
            "70": "Réaliste",
        }

        for id_rub, nom in categories.items():
            r = requests.get(
                f"https://api.www.root-me.org/challenges?id_rubrique={id_rub}",
                cookies=cookies,
                timeout=10
            )
            if r.status_code == 200:
                data = r.json()
                total = len(data) if isinstance(data, list) else len(data.get("0", {}))
                print(f"{nom} (id={id_rub}): {total} challenges total")
            else:
                print(f"{nom}: status {r.status_code}")
        EOF

name: Mise à jour score Root-Me

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update_rootme:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Récupération du code
      uses: actions/checkout@v4

    - name: 🐍 Configuration de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 📦 Installation des dépendances
      run: pip install requests

    - name: 🎯 Récupération du score Root-Me
      env:
        ROOTME_API_KEY: ${{ secrets.ROOTME_API_KEY }}
      run: |
        python3 << 'EOF'
        import requests
        import re
        import sys
        import os
        import json
        from collections import defaultdict
        from datetime import datetime, timezone

        username = "armelpltr"
        api_key = os.environ["ROOTME_API_KEY"]
        cookies = {"api_key": api_key}

        CATEGORIES = {
            "68":  "Web-Serveur",
            "16":  "Web-Client",
            "18":  "Cryptanalyse",
            "69":  "Cracking",
            "182": "Réseau",
            "67":  "Stéganographie",
            "189": "App-Script",
            "17":  "Programmation",
            "70":  "Réaliste",
            "208": "Forensic",
            "203": "App-Système",
        }

        try:
            # Étape 1 : récupérer l'id_auteur
            r = requests.get(
                f"https://api.www.root-me.org/auteurs?nom={username}",
                cookies=cookies,
                timeout=10
            )
            r.raise_for_status()
            auteurs = r.json()

            # DEBUG : afficher la réponse brute pour comprendre la structure
            print("=== Réponse brute /auteurs ===")
            print(json.dumps(auteurs, indent=2, ensure_ascii=False)[:800])
            print("==============================")

            auteurs_list = list(auteurs.values()) if isinstance(auteurs, dict) else auteurs

            id_auteur = None
            # Cherche d'abord correspondance exacte
            for a in auteurs_list:
                if isinstance(a, dict) and a.get("nom", "").lower() == username.lower():
                    id_auteur = a.get("id_auteur")
                    print(f"✅ Correspondance exacte : {a.get('nom')} → id {id_auteur}")
                    break

            # Sinon prend le premier résultat (la recherche est déjà filtrée)
            if not id_auteur:
                for a in auteurs_list:
                    if isinstance(a, dict) and "id_auteur" in a:
                        id_auteur = a.get("id_auteur")
                        print(f"⚠️ Correspondance approx : {a.get('nom')} → id {id_auteur}")
                        break

            if not id_auteur:
                print(f"❌ Aucun utilisateur trouvé pour '{username}'")
                sys.exit(1)

            # Étape 2 : profil complet
            r2 = requests.get(
                f"https://api.www.root-me.org/auteurs/{id_auteur}",
                cookies=cookies,
                timeout=10
            )
            r2.raise_for_status()
            profil = r2.json()

            # DEBUG : afficher les clés du profil
            print(f"=== Clés du profil : {list(profil.keys()) if isinstance(profil, dict) else type(profil)} ===")

            challenges_valides = profil.get("challenges", [])
            if isinstance(challenges_valides, dict):
                challenges_valides = list(challenges_valides.values())

            print(f"📊 {len(challenges_valides)} challenges validés")

            # DEBUG : afficher les 2 premiers challenges pour vérifier la structure
            if challenges_valides:
                print("Exemple challenge[0] :", json.dumps(challenges_valides[0], ensure_ascii=False))

            counts = defaultdict(int)
            for chall in challenges_valides:
                if isinstance(chall, dict):
                    id_rub = str(chall.get("id_rubrique", ""))
                    if id_rub in CATEGORIES:
                        counts[CATEGORIES[id_rub]] += 1

            total = sum(counts.values())
            themes = [
                {"name": cat, "count": n}
                for cat, n in sorted(counts.items(), key=lambda x: -x[1])
                if n > 0
            ]
            updated_at = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

            stats_json = json.dumps(
                {"total": total, "themes": themes, "updated_at": updated_at},
                ensure_ascii=False
            )

            with open("Site/config.js", "r", encoding="utf-8") as f:
                content = f.read()

            new_content = re.sub(
                r'rootmeStats:\s*\{[^}]*\}',
                f'rootmeStats: {stats_json}',
                content,
                flags=re.DOTALL
            )

            if new_content == content:
                print("❌ Regex non matchée")
                sys.exit(1)

            with open("Site/config.js", "w", encoding="utf-8") as f:
                f.write(new_content)

            print(f"✅ config.js mis à jour — {total} challenges, {len(themes)} thèmes")
            for t in themes:
                print(f"   {t['name']}: {t['count']}")

        except Exception as e:
            print(f"❌ Erreur : {e}")
            import traceback; traceback.print_exc()
            sys.exit(1)
        EOF

    - name: 💾 Commit de la mise à jour
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add Site/config.js
        git diff --staged --quiet && echo "Aucune modification du score" && exit 0
        git commit -m "Automated: Mise à jour score Root-Me 🎯"
        git push

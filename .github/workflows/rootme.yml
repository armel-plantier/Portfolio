name: Mise à jour score Root-Me

on:
  schedule:
    - cron: '0 8 * * 1'  # Tous les lundis à 8h UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update_rootme:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Récupération du code
      uses: actions/checkout@v4

    - name: 🐍 Configuration de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 📦 Installation des dépendances
      run: pip install requests

    - name: 🎯 Récupération du score Root-Me
      env:
        ROOTME_API_KEY: ${{ secrets.ROOTME_API_KEY }}
      run: |
        python3 << 'EOF'
        import requests
        import re
        import sys
        import os
        import json
        from collections import defaultdict
        from datetime import datetime, timezone

        username = "armelpltr"
        api_key = os.environ["ROOTME_API_KEY"]
        cookies = {"api_key": api_key}

        CATEGORIES = {
            "68":  "Web-Serveur",
            "16":  "Web-Client",
            "18":  "Cryptanalyse",
            "69":  "Cracking",
            "182": "Réseau",
            "67":  "Stéganographie",
            "189": "App-Script",
            "17":  "Programmation",
            "70":  "Réaliste",
            "208": "Forensic",
            "203": "App-Système",
        }

        try:
            r = requests.get(
                f"https://api.www.root-me.org/challenges?username={username}",
                cookies=cookies,
                timeout=10
            )
            r.raise_for_status()
            data = r.json()

            challenges = list(data.values()) if isinstance(data, dict) else data

            counts = defaultdict(int)  # ← corrigé : manquait dans l'ancienne version
            for chall in challenges:
                if isinstance(chall, dict):
                    id_rub = str(chall.get("id_rubrique", ""))
                    if id_rub in CATEGORIES:
                        counts[CATEGORIES[id_rub]] += 1

            total = sum(counts.values())
            themes = [
                {"name": cat, "count": n}
                for cat, n in sorted(counts.items(), key=lambda x: -x[1])
                if n > 0
            ]
            updated_at = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

            # Sérialiser le bloc rootmeStats en JSON compact (sur une ligne pour la regex)
            stats_json = json.dumps(
                {"total": total, "themes": themes, "updated_at": updated_at},
                ensure_ascii=False
            )

            with open("Site/config.js", "r", encoding="utf-8") as f:
                content = f.read()

            # Remplace le bloc rootmeStats: { ... } (multi-ligne, non-greedy)
            new_content = re.sub(
                r'rootmeStats:\s*\{[^}]*\}',
                f'rootmeStats: {stats_json}',
                content,
                flags=re.DOTALL
            )

            if new_content == content:
                print("❌ La regex n'a rien matché — vérifier le format de rootmeStats dans config.js")
                sys.exit(1)

            with open("Site/config.js", "w", encoding="utf-8") as f:
                f.write(new_content)

            print(f"✅ config.js mis à jour — {total} challenges, {len(themes)} thèmes")
            for t in themes:
                print(f"   {t['name']}: {t['count']}")

        except Exception as e:
            print(f"❌ Erreur : {e}")
            import traceback; traceback.print_exc()
            sys.exit(1)
        EOF

    - name: 💾 Commit de la mise à jour
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add Site/config.js
        git diff --staged --quiet && echo "Aucune modification du score" && exit 0
        git commit -m "Automated: Mise à jour score Root-Me 🎯"
        git push

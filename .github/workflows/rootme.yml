name: Debug Root-Me API

on:
  workflow_dispatch:

jobs:
  debug_rootme:
    runs-on: ubuntu-latest

    steps:
    - name: 🐍 Configuration de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 📦 Installation des dépendances
      run: pip install requests

    - name: 🔍 Exploration de l'API Root-Me
      env:
        ROOTME_API_KEY: ${{ secrets.ROOTME_API_KEY }}
      run: |
        python3 << 'EOF'
        import requests
        import json
        import os

        username = "armelpltr"
        api_key = os.environ["ROOTME_API_KEY"]
        cookies = {"api_key": api_key}

        # Test endpoint /rubriques/ pour avoir le total par catégorie
        print("=== /rubriques/ ===")
        r = requests.get(
            "https://api.www.root-me.org/rubriques",
            cookies=cookies,
            timeout=10
        )
        print(f"Status: {r.status_code}")
        if r.status_code == 200:
            data = r.json()
            print(json.dumps(data[:3] if isinstance(data, list) else data, indent=2, ensure_ascii=False))

        # Test endpoint /challenges sans username pour avoir tous les challenges
        print("\n=== /challenges (sans username, premier élément) ===")
        r2 = requests.get(
            "https://api.www.root-me.org/challenges",
            cookies=cookies,
            timeout=10
        )
        print(f"Status: {r2.status_code}")
        if r2.status_code == 200:
            data2 = r2.json()
            if isinstance(data2, list):
                print(f"Total challenges: {len(data2)}")
                print(json.dumps(data2[0], indent=2, ensure_ascii=False))
            else:
                print(json.dumps(data2, indent=2, ensure_ascii=False))
        EOF

name: Mise à jour score Root-Me

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update_rootme:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Récupération du code
      uses: actions/checkout@v4

    - name: 🐍 Configuration de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 📦 Installation des dépendances
      run: pip install requests

    - name: 🎯 Récupération du score Root-Me
      env:
        ROOTME_API_KEY: ${{ secrets.ROOTME_API_KEY }}
      run: |
        python3 << 'EOF'
        import requests
        import re
        import sys
        import os
        import json
        from collections import defaultdict
        from datetime import datetime, timezone

        username = "armelpltr"
        api_key = os.environ["ROOTME_API_KEY"]
        cookies = {"api_key": api_key}

        CATEGORIES = {
            "68":  "Web-Serveur",
            "16":  "Web-Client",
            "18":  "Cryptanalyse",
            "69":  "Cracking",
            "182": "Réseau",
            "67":  "Stéganographie",
            "189": "App-Script",
            "17":  "Programmation",
            "70":  "Réaliste",
            "208": "Forensic",
            "203": "App-Système",
        }

        try:
            # Étape 1 : récupérer l'id_auteur
            r = requests.get(
                f"https://api.www.root-me.org/auteurs?nom={username}",
                cookies=cookies, timeout=10
            )
            r.raise_for_status()
            auteurs = r.json()

            # La réponse est [ {"0": {"id_auteur": "...", "nom": "..."}} ]
            flat = []
            for item in auteurs:
                if isinstance(item, dict):
                    for v in item.values():
                        if isinstance(v, dict):
                            flat.append(v)

            id_auteur = None
            for a in flat:
                if a.get("nom", "").lower() == username.lower():
                    id_auteur = a.get("id_auteur")
                    break

            if not id_auteur:
                print(f"❌ Utilisateur '{username}' introuvable")
                sys.exit(1)

            print(f"✅ id_auteur trouvé : {id_auteur}")

            # Étape 2 : profil complet
            r2 = requests.get(
                f"https://api.www.root-me.org/auteurs/{id_auteur}",
                cookies=cookies, timeout=10
            )
            r2.raise_for_status()
            profil = r2.json()

            position = int(profil.get("position", 0))
            score    = int(profil.get("score", 0))
            rang     = profil.get("rang", "")

            validations = profil.get("validations", [])
            if isinstance(validations, dict):
                validations = list(validations.values())

            print(f"📊 {len(validations)} challenges validés")

            # Étape 3 : compter par thème
            counts = defaultdict(int)
            for chall in validations:
                if isinstance(chall, dict):
                    id_rub = str(chall.get("id_rubrique", ""))
                    if id_rub in CATEGORIES:
                        counts[CATEGORIES[id_rub]] += 1

            total = sum(counts.values())
            themes = [
                {"name": cat, "count": n}
                for cat, n in sorted(counts.items(), key=lambda x: -x[1])
                if n > 0
            ]

            # Étape 4 : estimer le total users via /classement
            top_percent = None
            try:
                r3 = requests.get(
                    "https://api.www.root-me.org/classement?debut_classement=500000",
                    cookies=cookies, timeout=10
                )
                if r3.status_code == 200:
                    data = r3.json()
                    items = list(data.values()) if isinstance(data, dict) else data
                    if items:
                        last = items[-1] if isinstance(items[-1], dict) else None
                        if last and "place" in last:
                            total_users = int(last["place"])
                            top_percent = round((position / total_users) * 100, 1)
                            print(f"✅ Position {position}/{total_users} → top {top_percent}%")
            except Exception as e:
                print(f"⚠️ Classement indisponible : {e}")

            updated_at = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

            stats_json = json.dumps({
                "total": total,
                "themes": themes,
                "position": position,
                "score": score,
                "rang": rang,
                "top_percent": top_percent,
                "updated_at": updated_at
            }, ensure_ascii=False, separators=(",", ":"))

            # Remplacement ligne par ligne (robuste peu importe le format)
            with open("Site/config.js", "r", encoding="utf-8") as f:
                lines = f.readlines()

            new_lines = []
            replaced = False
            for line in lines:
                if "rootmeStats:" in line:
                    indent = len(line) - len(line.lstrip())
                    new_lines.append(" " * indent + f"rootmeStats: {stats_json},\n")
                    replaced = True
                else:
                    new_lines.append(line)

            if not replaced:
                print("❌ Ligne rootmeStats introuvable dans config.js")
                sys.exit(1)

            with open("Site/config.js", "w", encoding="utf-8") as f:
                f.writelines(new_lines)

            top_str = f" · top {top_percent}%" if top_percent else ""
            print(f"✅ config.js mis à jour : {total} challenges, position {position}{top_str}")

        except Exception as e:
            print(f"❌ Erreur : {e}")
            import traceback; traceback.print_exc()
            sys.exit(1)
        EOF

    - name: 💾 Commit de la mise à jour
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add Site/config.js
        git diff --staged --quiet && echo "Aucune modification du score" && exit 0
        git commit -m "Automated: Mise à jour score Root-Me 🎯"
        git push

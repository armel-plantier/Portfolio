name: Debug Root-Me API

on:
  workflow_dispatch:

jobs:
  debug_rootme:
    runs-on: ubuntu-latest

    steps:
    - name: 🐍 Configuration de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 📦 Installation des dépendances
      run: pip install requests

    - name: 🔍 Exploration de l'API Root-Me
      env:
        ROOTME_API_KEY: ${{ secrets.ROOTME_API_KEY }}
      run: |
        python3 << 'EOF'
        import requests
        import json
        import os

        username = "armelpltr"
        api_key = os.environ["ROOTME_API_KEY"]
        cookies = {"api_key": api_key}

        # Test endpoint /auteurs/
        print("=== /auteurs/ ===")
        r = requests.get(
            f"https://api.www.root-me.org/auteurs/{username}",
            cookies=cookies,
            timeout=10
        )
        print(f"Status: {r.status_code}")
        if r.status_code == 200:
            print(json.dumps(r.json(), indent=2, ensure_ascii=False))

        # Test endpoint /challenges avec details
        print("\n=== /challenges (premiers éléments) ===")
        r2 = requests.get(
            f"https://api.www.root-me.org/challenges?username={username}",
            cookies=cookies,
            timeout=10
        )
        print(f"Status: {r2.status_code}")
        if r2.status_code == 200:
            data = r2.json()
            if isinstance(data, list):
                print(f"Nombre total: {len(data)}")
                print("Exemple premier élément:")
                print(json.dumps(data[0] if data else {}, indent=2, ensure_ascii=False))
            else:
                print(json.dumps(data, indent=2, ensure_ascii=False))
        EOF

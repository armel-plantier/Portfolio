name: Mise à jour score Root-Me

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update_rootme:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Récupération du code
      uses: actions/checkout@v4

    - name: 🐍 Configuration de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 📦 Installation des dépendances
      run: pip install requests

    - name: 🎯 Récupération du score Root-Me
      env:
        ROOTME_API_KEY: ${{ secrets.ROOTME_API_KEY }}
      run: |
        python3 << 'EOF'
        import requests
        import re
        import sys
        import os
        import json
        from collections import defaultdict
        from datetime import datetime, timezone

        username = "armelpltr"
        api_key = os.environ["ROOTME_API_KEY"]
        cookies = {"api_key": api_key}

        CATEGORIES = {
            "68":  "Web-Serveur",
            "16":  "Web-Client",
            "18":  "Cryptanalyse",
            "69":  "Cracking",
            "182": "Réseau",
            "67":  "Stéganographie",
            "189": "App-Script",
            "17":  "Programmation",
            "70":  "Réaliste",
            "208": "Forensic",
            "203": "App-Système",
        }

        try:
            # Étape 1 : récupérer l'id_auteur
            r = requests.get(
                f"https://api.www.root-me.org/auteurs?nom={username}",
                cookies=cookies,
                timeout=10
            )
            r.raise_for_status()
            auteurs = r.json()

            flat = []
            for item in auteurs:
                if isinstance(item, dict):
                    for v in item.values():
                        if isinstance(v, dict):
                            flat.append(v)

            id_auteur = None
            for a in flat:
                if a.get("nom", "").lower() == username.lower():
                    id_auteur = a.get("id_auteur")
                    print(f"✅ id_auteur trouvé : {id_auteur}")
                    break

            if not id_auteur:
                print(f"❌ Utilisateur '{username}' introuvable")
                sys.exit(1)

            # Étape 2 : profil complet
            r2 = requests.get(
                f"https://api.www.root-me.org/auteurs/{id_auteur}",
                cookies=cookies,
                timeout=10
            )
            r2.raise_for_status()
            profil = r2.json()

            # DEBUG : structure complète du profil
            print("=== Clés du profil ===")
            if isinstance(profil, dict):
                for k, v in profil.items():
                    if isinstance(v, list):
                        print(f"  {k}: liste de {len(v)} éléments")
                        if v:
                            print(f"    exemple[0]: {json.dumps(v[0], ensure_ascii=False)[:200]}")
                    elif isinstance(v, dict):
                        print(f"  {k}: dict avec clés {list(v.keys())[:5]}")
                    else:
                        print(f"  {k}: {v}")
            elif isinstance(profil, list):
                print(f"Profil est une liste de {len(profil)} éléments")
                if profil:
                    print(f"exemple[0]: {json.dumps(profil[0], ensure_ascii=False)[:300]}")
            print("======================")

            # Chercher les challenges dans toutes les clés possibles
            challenges_valides = []
            for key in ["challenges", "validations", "solved", "challs", "challenge"]:
                val = profil.get(key) if isinstance(profil, dict) else None
                if val:
                    challenges_valides = list(val.values()) if isinstance(val, dict) else val
                    print(f"✅ Clé trouvée : '{key}' → {len(challenges_valides)} éléments")
                    break

            if not challenges_valides:
                print("❌ Aucune clé de challenges trouvée dans le profil")
                sys.exit(1)

            # Étape 3 : compter par thème
            counts = defaultdict(int)
            for chall in challenges_valides:
                if isinstance(chall, dict):
                    id_rub = str(chall.get("id_rubrique", ""))
                    if id_rub in CATEGORIES:
                        counts[CATEGORIES[id_rub]] += 1

            total = sum(counts.values())
            themes = [
                {"name": cat, "count": n}
                for cat, n in sorted(counts.items(), key=lambda x: -x[1])
                if n > 0
            ]
            updated_at = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

            stats_json = json.dumps(
                {"total": total, "themes": themes, "updated_at": updated_at},
                ensure_ascii=False
            )

            with open("Site/config.js", "r", encoding="utf-8") as f:
                content = f.read()

            new_content = re.sub(
                r'rootmeStats:\s*\{[^}]*\}',
                f'rootmeStats: {stats_json}',
                content,
                flags=re.DOTALL
            )

            if new_content == content:
                print("❌ Regex non matchée")
                sys.exit(1)

            with open("Site/config.js", "w", encoding="utf-8") as f:
                f.write(new_content)

            print(f"✅ config.js mis à jour — {total} challenges, {len(themes)} thèmes")
            for t in themes:
                print(f"   {t['name']}: {t['count']}")

        except Exception as e:
            print(f"❌ Erreur : {e}")
            import traceback; traceback.print_exc()
            sys.exit(1)
        EOF

    - name: 💾 Commit de la mise à jour
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add Site/config.js
        git diff --staged --quiet && echo "Aucune modification du score" && exit 0
        git commit -m "Automated: Mise à jour score Root-Me 🎯"
        git push

name: Générateur de Veille Cyber et Déploiement

on:
  schedule:
    # S'exécute tous les jours à 22h00 UTC (~23h00 en France)
    - cron: '0 22 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Récupération du code
      uses: actions/checkout@v4

    - name: 🐍 Configuration de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 📦 Installation des dépendances
      run: |
        pip install google-generativeai feedparser markdown requests

    - name: 🧠 Exécution de l'IA (Script Python)
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      run: python Veille/veille.py

    - name: 🚀 Commit de la nouvelle veille
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add Veille/index.html
        git commit -m "Automated: Mise à jour de la veille 🤖" || echo "Aucune modification"
        git pull --rebase origin main
        git push

    - name: 📁 Préparation de la structure du site
      run: |
        cp -r Documents Site/
        cp -r Veille Site/

    - name: ⚙️ Configuration de GitHub Pages
      uses: actions/configure-pages@v5

    - name: 📤 Upload de l'artéfact Site
      uses: actions/upload-pages-artifact@v3
      with:
        path: './Site'

    - name: 🌐 Déploiement final
      id: deployment
      uses: actions/deploy-pages@v4

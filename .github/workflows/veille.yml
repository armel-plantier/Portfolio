name: Générateur de Veille Cyber

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch: 

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 📥 Récupération du code
      uses: actions/checkout@v4

    - name: 🐍 Configuration de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 📦 Installation des dépendances
      run: |
        pip install google-genai feedparser

    # ON APPELLE LE SCRIPT DANS LE BON DOSSIER (AVEC LA MAJUSCULE)
    - name: 🧠 Exécution de l'IA (Script Python)
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python Veille/veille.py

    # ON COMMIT LE FICHIER DANS LE BON DOSSIER (AVEC LA MAJUSCULE)
    - name: 🚀 Commit et Push dans le portfolio
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add Veille/index.md
        git commit -m "Automated: Mise à jour de la veille 🤖" || echo "Aucune modification à commiter"
        git push

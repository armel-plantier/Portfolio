name: Générateur de Veille Cyber et Déploiement

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
  push:
    branches:
      - main # Déploie le site à chaque fois que tu modifies ton code source

# Autorisations nécessaires pour modifier le code ET publier sur GitHub Pages
permissions:
  contents: write
  pages: write      
  id-token: write   

# Empêche deux déploiements de se lancer en même temps
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Récupération du code
      uses: actions/checkout@v4

    - name: 🐍 Configuration de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 📦 Installation des dépendances
      run: |
        pip install google-genai feedparser markdown

    - name: 🧠 Exécution de l'IA (Script Python)
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python Veille/veille.py

    - name: 🚀 Commit de la veille
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add Veille/index.html
        git commit -m "Automated: Mise à jour de la veille 🤖" || echo "Aucune modification à commiter"
        git push

    - name: ⚙️ Configuration de GitHub Pages
      uses: actions/configure-pages@v5

    - name: 📤 Upload des fichiers du Portfolio
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.' # Prend tout le dossier racine de ton site

    - name: 🌐 Déploiement du site en ligne !
      id: deployment
      uses: actions/deploy-pages@v4
